<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give Online - AFMIZ Mercy City Assembly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .donation-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .donation-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .donation-header h1 {
            font-size: 2rem;
            margin: 20px 0;
            color: var(--text);
        }
        .donation-header p {
            color: var(--text-soft);
            font-size: 1.1rem;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 121, 255, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .donation-type {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .donation-type input[type="radio"] {
            display: none;
        }
        .donation-type label {
            position: relative;
            padding: 16px;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0;
        }
        .donation-type input[type="radio"]:checked + label {
            border-color: var(--accent);
            background: rgba(245, 178, 59, 0.1);
            color: var(--accent);
            font-weight: 600;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-strong));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(74, 121, 255, 0.3);
        }
        .message {
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="donation-container">
        <div class="donation-header">
            <h1><i class="fas fa-heart" style="color: #f5b23b;"></i></h1>
            <h1>Give Online</h1>
            <p>Support our ministries and the work God is doing through Mercy City Assembly</p>
        </div>

        <div id="message" class="message"></div>

        <form id="donationForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>Donation Type *</label>
                <div class="donation-type">
                    <div>
                        <input type="radio" id="tithes" name="donationType" value="Tithes" checked>
                        <label for="tithes">Tithes</label>
                    </div>
                    <div>
                        <input type="radio" id="offering" name="donationType" value="Offering">
                        <label for="offering">Offering</label>
                    </div>
                    <div>
                        <input type="radio" id="missions" name="donationType" value="Missions">
                        <label for="missions">Missions</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Amount (ZWL) *</label>
                <input type="number" id="amount" name="amount" min="1" step="0.01" placeholder="Enter amount" required>
            </div>

            <div class="form-group">
                <label>Payment Method *</label>
                <select id="paymentMethod" name="paymentMethod" required>
                    <option value="">Select payment method</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Mobile Money">Mobile Money</option>
                    <option value="Cash">Cash</option>
                    <option value="Cheque">Cheque</option>
                </select>
            </div>

            <div class="form-group">
                <label>Message/Prayer Request (Optional)</label>
                <textarea id="message" name="message" rows="4" placeholder="Share your prayer request or message..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-check-circle"></i> Submit Donation
            </button>
        </form>

        <div class="back-link">
            <a href="index.html#donate">← Back to Home</a>
        </div>
    </div>

    <script>
        const DONATIONS_KEY = 'churchDonations';

        function loadDonations() {
            const stored = localStorage.getItem(DONATIONS_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveDonation(donation) {
            const donations = loadDonations();
            donations.push({
                ...donation,
                id: Date.now(),
                submittedAt: new Date().toISOString()
            });
            localStorage.setItem(DONATIONS_KEY, JSON.stringify(donations));
        }

        function showMessage(text, type = 'success') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = 'index.html#donate';
                }, 2000);
            }
        }

        document.getElementById('donationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const donation = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                donationType: document.querySelector('input[name="donationType"]:checked').value,
                amount: parseFloat(document.getElementById('amount').value),
                paymentMethod: document.getElementById('paymentMethod').value,
                message: document.getElementById('message').value.trim()
            };

            if (!donation.fullName || !donation.email || !donation.phone || !donation.amount || !donation.paymentMethod) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            saveDonation(donation);
            showMessage('Thank you for your donation! Returning to home page...', 'success');
        });
    </script>
</body>
</html>
